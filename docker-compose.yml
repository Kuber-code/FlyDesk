# FlyDesk stack.
#   Phase 1: web (Django/gunicorn) + mongo
#   Phase 2: + redis
#   Phase 3: + redpanda (Kafka API) + relay + worker (outbox relay & consumers)
#   Phase 4 (later): + prometheus + grafana
#
# web, relay and worker all run the same image (built once) with different commands.

x-app-env: &app-env
  DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-insecure-change-me}
  DJANGO_DEBUG: ${DJANGO_DEBUG:-false}
  DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,web
  MONGO_URI: mongodb://mongo:27017
  MONGO_DB: ${MONGO_DB:-flydesk}
  REDIS_URL: redis://redis:6379/0
  KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
  DUFFEL_API_TOKEN: ${DUFFEL_API_TOKEN:-}
  DUFFEL_API_URL: ${DUFFEL_API_URL:-https://api.duffel.com}
  DUFFEL_API_VERSION: ${DUFFEL_API_VERSION:-v2}
  FLYDESK_PROVIDER: ${FLYDESK_PROVIDER:-duffel}
  FLYDESK_ENV: ${FLYDESK_ENV:-docker}
  LOG_JSON: ${LOG_JSON:-true}
  SENTRY_DSN: ${SENTRY_DSN:-}

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redpanda:
    image: redpandadata/redpanda:latest
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092
      - --smp=1
      - --memory=512M
      - --overprovisioned
      - --node-id=0
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build: .
    image: flydesk:latest
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      <<: *app-env
      PROMETHEUS_MULTIPROC_DIR: /tmp/prom  # aggregate the gunicorn workers' metrics
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  relay:
    image: flydesk:latest
    restart: unless-stopped
    command: ["python", "manage.py", "relay_outbox"]
    environment:
      <<: *app-env
    depends_on:
      mongo:
        condition: service_healthy
      redpanda:
        condition: service_healthy

  worker:
    image: flydesk:latest
    restart: unless-stopped
    command: ["python", "manage.py", "consume_events"]
    environment:
      <<: *app-env
    depends_on:
      mongo:
        condition: service_healthy
      redpanda:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - web

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  mongo_data:
  grafana_data:
