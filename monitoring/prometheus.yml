global:
  scrape_interval: 10s

scrape_configs:
  - job_name: flydesk
    metrics_path: /metrics
    static_configs:
      - targets: ["web:8000"]

  # Redpanda exposes broker + consumer-group metrics (incl. consumer lag) here.
  - job_name: redpanda
    metrics_path: /public_metrics
    static_configs:
      - targets: ["redpanda:9644"]
