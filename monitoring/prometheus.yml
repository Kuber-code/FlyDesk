global:
  scrape_interval: 10s

scrape_configs:
  - job_name: flydesk
    metrics_path: /metrics
    static_configs:
      - targets: ["web:8000"]

  # relay + worker aren't HTTP servers; they expose metrics on :8001
  - job_name: flydesk-workers
    static_configs:
      - targets: ["relay:8001", "worker:8001"]

  # Redpanda exposes broker + consumer-group metrics (incl. consumer lag) here.
  - job_name: redpanda
    metrics_path: /public_metrics
    static_configs:
      - targets: ["redpanda:9644"]
